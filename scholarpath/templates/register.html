{% extends "layout.html" %}

{% block main %}

<h1 class="page-title">

Create Account

</h1>

<div class="login-card">

<form action="/register" method="POST">

<input
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<input
type="password"
name="confirmation"
placeholder="Confirm Password"
required>

<button class="tracker-btn">

Create Account

</button>

</form>

</div>

{% endblock %}
